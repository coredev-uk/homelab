apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exportarr
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: {{ .Values.repo.mainUrl }}    
    targetRevision: {{ .Values.repo.mainBranch }}
    path: charts/exportarr
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: exportarr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true 
