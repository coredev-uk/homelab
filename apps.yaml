apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-application
  namespace: argocd
spec:
  project: default
  source:
    repoURL: {{ .Values.repo.mainUrl }}
    path: templates
    targetRevision: {{ .Values.repo.mainBranch }}
    kustomize: 
      commonLabels:
        app.kubernetes.io/managed-by: argocd
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
